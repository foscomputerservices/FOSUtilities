name: CI

on:
  workflow_dispatch:
  pull_request:

jobs:
  run_tests:
    name: Test Swift v${{ matrix.swift }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest] #, windows-latest] #, macos-latest] -- MasOS hangs on swift build, runs fine on xcodebuild
        swift: ["6.3.2"] # match the dev/release toolchain; 6.2.1 crashed under parallel-test load (runtime bug fixed upstream)
      fail-fast: false
    steps:
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ matrix.swift }}

      - uses: actions/checkout@v2

      - name: Run Tests
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            swift build
          else
            swift test
          fi
        shell: bash

      - name: API Catalog Audit
        if: matrix.os == 'ubuntu-latest'
        run: swift scripts/api-catalog-audit.swift
        shell: bash
 
  # Ensure that compilation succeeds via xcodebuild
  run_xcodebuild_tests:
    name: Buiild ${{ matrix.ios_platform }} via Xcodebuild 'latest-stable'
    runs-on: macos-latest
    strategy:
      matrix:
        ios_platform: ["macOS", "iOS", "watchOS", "tvOS"] # , "visionOS"] -- Not installed on GitHub Actions

    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/checkout@v2

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Run ${{ matrix.ios_platform }} build
        run: |
          xcrun xcodebuild -IDEClonedSourcePackagesDirPathOverride="$PWD/.dependencies" \
            -skipMacroValidation -skipPackagePluginValidation -derivedDataPath \
            "$PWD/.derivedData" -scheme FOSUtilities-Package \
            -destination "generic/platform=${{ matrix.ios_platform }}" build | xcpretty
        if: matrix.ios_platform != 'macOS'

      # Simply cannot get macOS to work with swift test & github actions, they hang 🤷‍♂️
      - name: Run macOS build
        run: |
          xcrun xcodebuild -IDEClonedSourcePackagesDirPathOverride="$PWD/.dependencies" \
            -skipMacroValidation -skipPackagePluginValidation \
            -derivedDataPath "$PWD/.derivedData" \
            -scheme FOSUtilities-Package \
            -destination "platform=macOS,arch=arm64,name=My Mac" build | xcpretty
        if: matrix.ios_platform == 'macOS'

  # Fail if the checked-in generated Localizable overloads are stale relative to
  # the SDKs. --check is stamp-aware: it compares the runner's SDK versions
  # against the stamp in SweepCoverage.md and only byte-compares when all five
  # match; a version mismatch (or a missing SDK) is an informational skip
  # (exit 0), never a false drift failure.
  #
  # DORMANT on today's hosted runners: GitHub's macos-latest ships no visionOS
  # SDK (see the ios_platform matrix comment above), so this gate SKIPs there
  # by design. The generated output is a function of ALL five SDKs
  # (union-derived availability), so a partial regeneration can never
  # byte-match. The gate fires on any machine with all five SDKs — maintainer
  # Macs today, hosted runners whenever GitHub adds visionOS.
  overload_sweep_staleness:
    name: Generated overloads staleness gate
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: actions/checkout@v2

      - name: Staleness gate
        run: swift scripts/localizable-overload-sweep.swift --check
